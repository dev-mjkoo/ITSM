<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ITSM MVP</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --surface-subtle: #f8fafc;
      --border: #d8dee6;
      --border-strong: #b9c2cf;
      --text: #17202a;
      --muted: #657386;
      --primary: #1f6feb;
      --primary-strong: #1557ba;
      --danger: #d73a49;
      --warning: #b7791f;
      --success: #218739;
      --shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      --sidebar-width: 248px;
      --header-height: 64px;
      --radius: 8px;
      font-family: Inter, "SF Pro Display", "SF Pro Text", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-width: 320px;
      color-scheme: light;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.5;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
      background: var(--bg);
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      border-right: 1px solid var(--border);
      background: #101827;
      color: #e8edf5;
    }

    .brand {
      height: var(--header-height);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      font-weight: 700;
      white-space: nowrap;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: inline-grid;
      place-items: center;
      border-radius: var(--radius);
      background: #2f81f7;
      color: #ffffff;
      font-size: 14px;
      letter-spacing: 0;
      flex: 0 0 auto;
    }

    .nav {
      display: grid;
      gap: 6px;
      padding: 16px 12px;
    }

    .nav-button {
      min-height: 44px;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: #b8c4d6;
      text-align: left;
      transition: background 180ms ease, color 180ms ease, border-color 180ms ease;
    }

    .nav-button:hover {
      background: rgba(255, 255, 255, 0.07);
      color: #ffffff;
    }

    .nav-button.is-active {
      background: rgba(47, 129, 247, 0.18);
      border-color: rgba(47, 129, 247, 0.44);
      color: #ffffff;
    }

    .nav-icon {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
    }

    .shell {
      min-width: 0;
      display: grid;
      grid-template-rows: var(--header-height) minmax(0, 1fr);
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 16px;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
    }

    .mobile-menu {
      display: none;
      width: 44px;
      height: 44px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
    }

    .page-title {
      min-width: 0;
    }

    .page-title h1 {
      margin: 0;
      color: var(--text);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1.25;
    }

    .content {
      min-width: 0;
      padding: 24px;
    }

    .view {
      display: none;
    }

    .view.is-active {
      display: block;
    }

    .workspace {
      min-height: calc(100vh - var(--header-height) - 48px);
      border: 1px dashed var(--border-strong);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .table-panel {
      min-height: calc(100vh - var(--header-height) - 48px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .table-scroll {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
    }

    .data-table {
      width: 100%;
      min-width: 1880px;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
      font-size: 13px;
      line-height: 1.35;
    }

    .data-table th,
    .data-table td {
      height: 42px;
      padding: 0 12px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      overflow: hidden;
      text-align: left;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: middle;
    }

    .data-table th {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface-subtle);
      color: #38475a;
      font-weight: 700;
    }

    .data-table th:last-child,
    .data-table td:last-child {
      border-right: 0;
    }

    .data-table .col-select {
      width: 56px;
      padding: 0;
      text-align: center;
    }

    .data-table .col-no {
      width: 64px;
      text-align: center;
    }

    .data-table .col-time {
      width: 150px;
    }

    .data-table .col-channel,
    .data-table .col-part {
      width: 110px;
    }

    .data-table .col-actor,
    .data-table .col-owner {
      width: 120px;
    }

    .data-table .col-code,
    .data-table .col-error-type,
    .data-table .col-error-code,
    .data-table .col-store,
    .data-table .col-host,
    .data-table .col-pid {
      width: 120px;
    }

    .data-table .col-name {
      width: 180px;
    }

    .data-table .col-message {
      width: 270px;
    }

    .data-table tbody td {
      color: #253246;
    }

    .data-table tbody tr:nth-child(even) td {
      background: #fbfcfe;
    }

    .data-table tbody tr:hover td {
      background: #f7fbff;
    }

    .data-table tbody tr.is-clickable {
      cursor: pointer;
    }

    .data-table tbody tr.is-selected td {
      background: #eef6ff;
    }

    .data-table tbody tr.is-locked td {
      color: #9aa7b8;
    }

    .select-control {
      min-height: 42px;
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .row-select {
      width: 18px;
      height: 18px;
      margin: 0;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .row-select:disabled,
    .row-select:disabled + .sr-only,
    .select-control:has(.row-select:disabled) {
      cursor: not-allowed;
    }

    .data-table td.col-code,
    .data-table td.col-error-type,
    .data-table td.col-error-code,
    .data-table td.col-host,
    .data-table td.col-pid {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 12px;
    }

    .error-code {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      height: 24px;
      padding: 0 8px;
      overflow: hidden;
      border: 1px solid #f3b8bf;
      border-radius: 999px;
      background: #fff1f3;
      color: #b4232f;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: middle;
    }

    .error-type {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 24px;
      border: 1px solid #c8d3e0;
      border-radius: 999px;
      background: #f3f6fa;
      color: #314154;
      font-weight: 700;
      vertical-align: middle;
    }

    .detail-modal[hidden] {
      display: none;
    }

    .detail-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(15, 23, 42, 0.52);
    }

    body.detail-open {
      overflow: hidden;
    }

    .detail-dialog {
      width: min(1120px, 100%);
      max-height: min(820px, calc(100vh - 48px));
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.24);
    }

    .detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-subtle);
    }

    .detail-title-block {
      min-width: 0;
    }

    .detail-title {
      margin: 0;
      color: var(--text);
      font-size: 24px;
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .detail-subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .detail-meta-token {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: #2d3c50;
      font-size: 12px;
      font-weight: 800;
    }

    .detail-meta-token strong {
      color: var(--muted);
      font-weight: 700;
    }

    .detail-meta-token.is-code span {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }

    .detail-meta-token.is-danger {
      border-color: #f3b8bf;
      background: #fff1f3;
      color: #b4232f;
    }

    .detail-close {
      width: 44px;
      height: 44px;
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    .detail-close:hover {
      border-color: var(--border-strong);
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.08);
    }

    .detail-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
    }

    .detail-chip {
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #f7f9fc;
      color: #344255;
      font-size: 12px;
      font-weight: 700;
    }

    .detail-chip strong {
      color: var(--muted);
      font-weight: 600;
    }

    .detail-body {
      overflow: auto;
      padding: 0 24px 22px;
    }

    .detail-section {
      padding: 20px 0 4px;
      border-bottom: 1px solid var(--border);
    }

    .detail-section:last-child {
      border-bottom: 0;
    }

    .detail-section h3 {
      margin: 0 0 12px;
      color: #26364a;
      font-size: 14px;
      line-height: 1.3;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px 16px;
    }

    .detail-field {
      min-width: 0;
      margin: 0;
    }

    .detail-field.is-wide {
      grid-column: span 2;
    }

    .detail-field.is-full {
      grid-column: 1 / -1;
    }

    .detail-field dt {
      margin: 0 0 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .detail-field dd {
      min-height: 32px;
      margin: 0;
      padding: 7px 10px;
      overflow-wrap: anywhere;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fbfcfe;
      color: #1d2a3a;
      font-size: 13px;
      line-height: 1.35;
    }

    .detail-field.is-code dd {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 12px;
    }

    .requirements-panel {
      min-height: calc(100vh - var(--header-height) - 48px);
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .requirements-scroll {
      overflow: auto;
    }

    .requirements-table {
      width: 100%;
      min-width: 960px;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
      font-size: 14px;
    }

    .requirements-table th,
    .requirements-table td {
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    .requirements-table th {
      position: sticky;
      top: 0;
      background: var(--surface-subtle);
      color: #38475a;
      font-size: 13px;
      font-weight: 700;
      z-index: 10;
    }

    .requirements-table .req-id {
      width: 104px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      color: #394b61;
    }

    .requirements-table .req-category {
      width: 140px;
      color: #4c5d72;
      font-weight: 700;
    }

    .requirements-table .req-status {
      width: 104px;
      color: var(--success);
      font-weight: 700;
    }

    .requirements-table .req-status.is-pending {
      color: var(--warning);
    }

    .scrim {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(15, 23, 42, 0.42);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    :focus-visible {
      outline: 3px solid rgba(31, 111, 235, 0.45);
      outline-offset: 2px;
    }

    @media (max-width: 760px) {
      :root {
        --header-height: 60px;
      }

      .app {
        grid-template-columns: minmax(0, 1fr);
      }

      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        z-index: 30;
        width: min(var(--sidebar-width), 82vw);
        transform: translateX(-100%);
        transition: transform 180ms ease;
      }

      body.nav-open .sidebar {
        transform: translateX(0);
      }

      body.nav-open .scrim {
        display: block;
      }

      .mobile-menu {
        display: inline-flex;
        flex: 0 0 auto;
      }

      .topbar {
        padding: 0 12px;
      }

      .page-title h1 {
        font-size: 17px;
      }

      .content {
        padding: 16px;
      }

      .workspace,
      .table-panel,
      .requirements-panel {
        min-height: calc(100vh - var(--header-height) - 32px);
      }

      .detail-modal {
        padding: 12px;
      }

      .detail-dialog {
        max-height: calc(100vh - 24px);
      }

      .detail-header,
      .detail-summary,
      .detail-body {
        padding-left: 16px;
        padding-right: 16px;
      }

      .detail-grid {
        grid-template-columns: minmax(0, 1fr);
      }

      .detail-title {
        font-size: 20px;
      }

      .detail-field.is-wide,
      .detail-field.is-full {
        grid-column: 1 / -1;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="주요 메뉴">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">IT</span>
        <span>ITSM MVP</span>
      </div>
      <nav class="nav">
        <button class="nav-button is-active" type="button" data-view-target="status-board">
          <svg class="nav-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none">
            <path d="M4 13h6V5H4v8Zm0 6h6v-4H4v4Zm10 0h6v-8h-6v8Zm0-10h6V5h-6v4Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          </svg>
          <span>오류상황판</span>
        </button>
        <button class="nav-button" type="button" data-view-target="event-management">
          <svg class="nav-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none">
            <path d="M6 6h12M6 12h12M6 18h7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="m16 16 2 2 4-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>이벤트 관리</span>
        </button>
        <button class="nav-button" type="button" data-view-target="requirements">
          <svg class="nav-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none">
            <path d="M7 3.5h7l3 3v14H7a2 2 0 0 1-2-2v-13a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            <path d="M14 3.5v4h4M8.5 12h7M8.5 15.5h7M8.5 19h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>개발요건</span>
        </button>
      </nav>
    </aside>

    <div class="shell">
      <header class="topbar">
        <button class="mobile-menu" type="button" aria-label="메뉴 열기">
          <svg width="22" height="22" aria-hidden="true" viewBox="0 0 24 24" fill="none">
            <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="page-title" aria-live="polite">
          <h1 id="page-heading">오류상황판</h1>
        </div>
      </header>

      <main class="content">
        <section class="view is-active" id="status-board" aria-labelledby="page-heading">
          <div class="table-panel">
            <div class="table-scroll">
              <table class="data-table" aria-label="오류상황판 목록">
                <thead>
                  <tr>
                    <th class="col-select" scope="col">선택</th>
                    <th class="col-no" scope="col">NO</th>
                    <th class="col-time" scope="col">등록시간</th>
                    <th class="col-channel" scope="col">채널유형</th>
                    <th class="col-part" scope="col">파트</th>
                    <th class="col-actor" scope="col">최종이행자</th>
                    <th class="col-owner" scope="col">담당자</th>
                    <th class="col-code" scope="col">거래코드</th>
                    <th class="col-name" scope="col">거래명</th>
                    <th class="col-error-type" scope="col">오류구분</th>
                    <th class="col-error-code" scope="col">에러코드</th>
                    <th class="col-message" scope="col">에러메시지</th>
                    <th class="col-store" scope="col">거래점</th>
                    <th class="col-host" scope="col">호스트명</th>
                    <th class="col-pid" scope="col">PID</th>
                  </tr>
                </thead>
                <tbody id="status-board-body"></tbody>
              </table>
            </div>
          </div>
        </section>

        <section class="view" id="event-management" aria-labelledby="page-heading">
          <div class="workspace" aria-label="이벤트 관리 빈 레이아웃"></div>
        </section>

        <section class="view" id="requirements" aria-labelledby="page-heading">
          <div class="requirements-panel">
            <div class="requirements-scroll">
              <table class="requirements-table" aria-label="개발요건 목록">
                <thead>
                  <tr>
                    <th class="req-id" scope="col">ID</th>
                    <th class="req-category" scope="col">구분</th>
                    <th scope="col">요건</th>
                    <th class="req-status" scope="col">상태</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td class="req-id">REQ-001</td>
                    <td class="req-category">행 선택</td>
                    <td>오류상황판 각 행의 첫 번째 컬럼에는 이벤트 조치 대상을 선택할 수 있는 체크박스를 제공한다.</td>
                    <td class="req-status">적용</td>
                  </tr>
                  <tr>
                    <td class="req-id">REQ-002</td>
                    <td class="req-category">선택 제한</td>
                    <td>오류상황판에서는 같은 거래코드와 에러코드를 가진 행만 동시에 여러 건 선택할 수 있다.</td>
                    <td class="req-status">적용</td>
                  </tr>
                  <tr>
                    <td class="req-id">REQ-003</td>
                    <td class="req-category">이벤트 조치</td>
                    <td>선택된 오류상황판 행은 추후 이벤트 조치 대상이 된다.</td>
                    <td class="req-status is-pending">대기</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div class="scrim" aria-hidden="true"></div>
  <div class="detail-modal" id="detail-modal" role="dialog" aria-modal="true" aria-labelledby="detail-title" hidden>
    <div class="detail-dialog">
      <header class="detail-header">
        <div class="detail-title-block">
          <h2 class="detail-title" id="detail-title"></h2>
          <div class="detail-subtitle" id="detail-subtitle"></div>
          <div class="detail-meta" id="detail-meta"></div>
        </div>
        <button class="detail-close" type="button" aria-label="상세 닫기">
          <svg width="20" height="20" aria-hidden="true" viewBox="0 0 24 24" fill="none">
            <path d="m6 6 12 12M18 6 6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </header>
      <div class="detail-summary" id="detail-summary"></div>
      <div class="detail-body" id="detail-body"></div>
    </div>
  </div>

  <script src="sample-data.js"></script>
  <script>
    const statusBoardColumns = [
      { key: "select", className: "col-select", selectable: true },
      { key: "no", className: "col-no" },
      { key: "registeredAt", className: "col-time" },
      { key: "channelType", className: "col-channel" },
      { key: "part", className: "col-part" },
      { key: "lastActor", className: "col-actor" },
      { key: "owner", className: "col-owner" },
      { key: "transactionCode", className: "col-code" },
      { key: "transactionName", className: "col-name" },
      { key: "errorType", className: "col-error-type", typeBadge: true },
      { key: "errorCode", className: "col-error-code", badge: true },
      { key: "errorMessage", className: "col-message" },
      { key: "store", className: "col-store" },
      { key: "hostName", className: "col-host" },
      { key: "pid", className: "col-pid" }
    ];

    const pageMeta = {
      "status-board": {
        title: "오류상황판"
      },
      "event-management": {
        title: "이벤트 관리"
      },
      "requirements": {
        title: "개발요건"
      }
    };

    const body = document.body;
    const selectedStatusRows = new Set();
    const navButtons = [...document.querySelectorAll("[data-view-target]")];
    const views = [...document.querySelectorAll(".view")];
    const pageHeading = document.querySelector("#page-heading");
    const menuButton = document.querySelector(".mobile-menu");
    const scrim = document.querySelector(".scrim");
    const statusBoardBody = document.querySelector("#status-board-body");
    const detailModal = document.querySelector("#detail-modal");
    const detailCloseButton = document.querySelector(".detail-close");
    const detailTitle = document.querySelector("#detail-title");
    const detailSubtitle = document.querySelector("#detail-subtitle");
    const detailMeta = document.querySelector("#detail-meta");
    const detailSummary = document.querySelector("#detail-summary");
    const detailBody = document.querySelector("#detail-body");
    let statusRows = [];
    let lastFocusedElement = null;

    const errorDetailMessages = {
      BXM30011: "서비스 계층에서 거래 처리 도중 예외가 반환되었습니다. 호스트 로그와 전문 응답 상태 확인이 필요합니다.",
      BXM40101: "업무 처리 모듈에서 처리 결과를 정상 수신하지 못했습니다. 서비스 호출 경로와 입력 전문 검증이 필요합니다.",
      BXM30002: "거래 처리 중 일시적인 지연이 감지되었습니다. 동일 거래 재시도 여부와 후속 응답 수신 여부 확인이 필요합니다.",
      PFM03030: "서비스 호출 제한 시간을 초과했습니다. 네트워크 지연, 호스트 부하, 전문 응답 지연 여부를 확인해야 합니다.",
      DEP10051: "원장 처리 중 예외가 발생했습니다. 계정계 원장 반영 결과와 보정 처리 필요 여부를 확인해야 합니다."
    };

    const detailSections = [
      {
        title: "오류 요약",
        fields: [
          { label: "호스트명", key: "hostName", code: true },
          { label: "에러코드", key: "errorCode", code: true },
          { label: "에러메시지", key: "errorMessage", wide: true },
          { label: "에러메시지상세내용", key: "errorMessageDetail", full: true }
        ]
      },
      {
        title: "거래 정보",
        fields: [
          { label: "거래코드", key: "transactionCode", code: true },
          { label: "거래명", key: "transactionName" },
          { label: "화면 ID", key: "screenId", code: true },
          { label: "글로벌 ID", key: "globalId", code: true },
          { label: "서비스명", key: "serviceName", code: true },
          { label: "거래점번호", key: "storeNumber", code: true },
          { label: "거래기번", key: "terminalNumber", code: true },
          { label: "채널유형", key: "channelType", code: true }
        ]
      },
      {
        title: "일시 및 전문",
        fields: [
          { label: "형상관리 최종이행일자", key: "deployDate", code: true },
          { label: "형상관리 최종이행시간", key: "deployTime", code: true },
          { label: "영업일자", key: "businessDate", code: true },
          { label: "시스템일자", key: "systemDate", code: true },
          { label: "전문전송일시", key: "telegramSentAt", code: true },
          { label: "로깅시각", key: "loggingTime", code: true }
        ]
      },
      {
        title: "운영 정보",
        fields: [
          { label: "PID", key: "pid", code: true },
          { label: "조작자행원번호", key: "operatorEmployee", code: true },
          { label: "파트명", key: "partName" },
          { label: "최종이행자", key: "lastActor" },
          { label: "담당자", key: "owner" },
          { label: "에러코드 설정위치", key: "errorCodeLocation", wide: true, code: true },
          { label: "에러발생정보", key: "errorOccurrenceInfo", full: true }
        ]
      }
    ];

    function toCompactDate(dateText) {
      return dateText.replaceAll("-", "");
    }

    function toCompactTime(timeText) {
      return timeText.replaceAll(":", "");
    }

    function getServiceName(transactionCode) {
      return transactionCode.slice(0, -2);
    }

    function getScreenId(row) {
      return `${String(100000 + row.no).slice(-6)}0001`;
    }

    function getGlobalId(row, businessDate, compactTime) {
      const sequence = String(row.no).padStart(8, "0");
      const pid = String(row.pid).padStart(6, "0").slice(-6);
      const store = String(row.store).padStart(4, "0").slice(-4);

      return `${businessDate}${compactTime}${pid}${store}${sequence}`.slice(0, 32);
    }

    function getDeployTime(row) {
      const hour = String(9 + (row.no % 8)).padStart(2, "0");
      const minute = String((row.no * 7) % 60).padStart(2, "0");
      const second = String((row.no * 11) % 60).padStart(2, "0");

      return `${hour}:${minute}:${second}`;
    }

    function getDetailRecord(row) {
      const [dateText, timeText] = row.registeredAt.split(" ");
      const businessDate = toCompactDate(dateText);
      const compactTime = toCompactTime(timeText);
      const serviceName = getServiceName(row.transactionCode);

      return {
        hostName: row.hostName,
        errorCode: row.errorCode,
        errorMessage: row.errorMessage,
        errorMessageDetail: errorDetailMessages[row.errorCode] || row.errorMessage,
        transactionCode: row.transactionCode,
        transactionName: row.transactionName,
        screenId: getScreenId(row),
        globalId: getGlobalId(row, businessDate, compactTime),
        deployDate: dateText,
        deployTime: getDeployTime(row),
        pid: row.pid,
        businessDate,
        systemDate: businessDate,
        serviceName,
        storeNumber: row.store,
        terminalNumber: String(8100 + row.no),
        channelType: row.channelType,
        telegramSentAt: `${businessDate}${compactTime}${row.no % 10}`,
        operatorEmployee: "20100061(구민준)",
        loggingTime: `${compactTime}${String(40000 + row.no * 277).slice(-5)}`,
        partName: row.part,
        lastActor: row.lastActor,
        owner: row.owner,
        errorCodeLocation: `${serviceName}/error-map/${row.errorCode}`,
        errorOccurrenceInfo: `${row.channelType} 채널 ${row.part}에서 ${row.transactionName} 처리 중 ${row.hostName} PID ${row.pid}에서 ${row.errorCode}가 발생했습니다.`
      };
    }

    function createDetailField(detail, field) {
      const wrapper = document.createElement("dl");
      const label = document.createElement("dt");
      const value = document.createElement("dd");

      wrapper.className = "detail-field";

      if (field.wide) {
        wrapper.classList.add("is-wide");
      }

      if (field.full) {
        wrapper.classList.add("is-full");
      }

      if (field.code) {
        wrapper.classList.add("is-code");
      }

      label.textContent = field.label;
      value.textContent = detail[field.key] ?? "";
      wrapper.append(label, value);

      return wrapper;
    }

    function createDetailSection(detail, section) {
      const sectionElement = document.createElement("section");
      const title = document.createElement("h3");
      const grid = document.createElement("div");

      sectionElement.className = "detail-section";
      title.textContent = section.title;
      grid.className = "detail-grid";

      section.fields.forEach((field) => {
        grid.append(createDetailField(detail, field));
      });

      sectionElement.append(title, grid);
      return sectionElement;
    }

    function createDetailMetaToken(label, value, variant = "") {
      const token = document.createElement("span");
      const tokenLabel = document.createElement("strong");
      const tokenValue = document.createElement("span");

      token.className = "detail-meta-token";

      if (variant) {
        token.classList.add(variant);
      }

      tokenLabel.textContent = label;
      tokenValue.textContent = value;
      token.append(tokenLabel, tokenValue);

      return token;
    }

    function createDetailChip(label, value) {
      const chip = document.createElement("span");
      const chipLabel = document.createElement("strong");
      const chipValue = document.createElement("span");

      chip.className = "detail-chip";
      chipLabel.textContent = label;
      chipValue.textContent = value;
      chip.append(chipLabel, chipValue);

      return chip;
    }

    function openDetailModal(row) {
      const detail = getDetailRecord(row);
      const fragment = document.createDocumentFragment();

      lastFocusedElement = document.activeElement;
      detailTitle.textContent = row.transactionName;
      detailSubtitle.textContent = `${row.hostName} · ${row.registeredAt}`;
      detailMeta.replaceChildren(
        createDetailMetaToken("거래코드", row.transactionCode, "is-code"),
        createDetailMetaToken("에러코드", row.errorCode, "is-danger"),
        createDetailMetaToken("오류구분", row.errorType)
      );
      detailSummary.replaceChildren(
        createDetailChip("채널", row.channelType),
        createDetailChip("오류구분", row.errorType),
        createDetailChip("거래점", row.store),
        createDetailChip("PID", row.pid)
      );

      detailSections.forEach((section) => {
        fragment.append(createDetailSection(detail, section));
      });

      detailBody.replaceChildren(fragment);
      detailModal.hidden = false;
      body.classList.add("detail-open");
      detailCloseButton.focus();
    }

    function closeDetailModal() {
      detailModal.hidden = true;
      body.classList.remove("detail-open");

      if (lastFocusedElement && document.contains(lastFocusedElement)) {
        lastFocusedElement.focus();
      }
    }

    function getSelectionKey(row) {
      return `${row.transactionCode}::${row.errorCode}`;
    }

    function getActiveSelectionKey() {
      const selectedId = [...selectedStatusRows][0];
      const row = statusRows.find((item) => String(item.no) === selectedId);

      return row ? getSelectionKey(row) : "";
    }

    function updateRowSelectionState() {
      const activeKey = getActiveSelectionKey();
      const selectors = [...document.querySelectorAll("[data-row-select]")];

      selectors.forEach((selector) => {
        const row = statusRows.find((item) => String(item.no) === selector.dataset.rowId);
        const rowKey = row ? getSelectionKey(row) : "";
        const isSelected = selectedStatusRows.has(selector.dataset.rowId);
        const isLocked = Boolean(activeKey && rowKey !== activeKey && !isSelected);
        const tableRow = selector.closest("tr");

        selector.checked = isSelected;
        selector.disabled = isLocked;
        tableRow.classList.toggle("is-selected", isSelected);
        tableRow.classList.toggle("is-locked", isLocked);
      });
    }

    function handleRowSelect(row, selector) {
      const rowId = String(row.no);
      const activeKey = getActiveSelectionKey();
      const rowKey = getSelectionKey(row);

      if (selector.checked && activeKey && rowKey !== activeKey) {
        selector.checked = false;
        return;
      }

      if (selector.checked) {
        selectedStatusRows.add(rowId);
      } else {
        selectedStatusRows.delete(rowId);
      }

      updateRowSelectionState();
    }

    function createStatusCell(row, column) {
      const cell = document.createElement("td");
      const value = row[column.key] ?? "";

      cell.className = column.className;

      if (column.selectable) {
        const label = document.createElement("label");
        const checkbox = document.createElement("input");
        const hiddenText = document.createElement("span");

        label.className = "select-control";
        checkbox.className = "row-select";
        checkbox.type = "checkbox";
        checkbox.dataset.rowSelect = "true";
        checkbox.dataset.rowId = String(row.no);
        hiddenText.className = "sr-only";
        hiddenText.textContent = `${row.no}번 오류 이벤트 선택`;

        checkbox.addEventListener("change", () => handleRowSelect(row, checkbox));
        label.append(checkbox, hiddenText);
        cell.append(label);

        return cell;
      }

      cell.title = String(value);

      if (column.badge) {
        const badge = document.createElement("span");
        badge.className = "error-code";
        badge.textContent = value;
        cell.append(badge);
        return cell;
      }

      if (column.typeBadge) {
        const badge = document.createElement("span");
        badge.className = "error-type";
        badge.textContent = value;
        cell.append(badge);
        return cell;
      }

      cell.textContent = value;
      return cell;
    }

    function renderStatusBoardRows(rows) {
      const fragment = document.createDocumentFragment();

      statusRows = rows;
      selectedStatusRows.clear();

      rows.forEach((row) => {
        const tableRow = document.createElement("tr");

        statusBoardColumns.forEach((column) => {
          tableRow.append(createStatusCell(row, column));
        });

        tableRow.className = "is-clickable";
        tableRow.tabIndex = 0;
        tableRow.setAttribute("aria-label", `${row.no}번 오류 상세 열기`);
        tableRow.addEventListener("click", (event) => {
          if (event.target.closest(".select-control, .row-select")) {
            return;
          }

          openDetailModal(row);
        });
        tableRow.addEventListener("keydown", (event) => {
          if (event.target.closest(".select-control, .row-select")) {
            return;
          }

          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            openDetailModal(row);
          }
        });
        fragment.append(tableRow);
      });

      statusBoardBody.replaceChildren(fragment);
      updateRowSelectionState();
    }

    function showView(viewId) {
      const meta = pageMeta[viewId];

      views.forEach((view) => {
        view.classList.toggle("is-active", view.id === viewId);
      });

      navButtons.forEach((button) => {
        const isActive = button.dataset.viewTarget === viewId;
        button.classList.toggle("is-active", isActive);
        button.setAttribute("aria-current", isActive ? "page" : "false");
      });

      pageHeading.textContent = meta.title;
      body.classList.remove("nav-open");
    }

    navButtons.forEach((button) => {
      button.addEventListener("click", () => showView(button.dataset.viewTarget));
    });

    menuButton.addEventListener("click", () => {
      body.classList.toggle("nav-open");
    });

    scrim.addEventListener("click", () => {
      body.classList.remove("nav-open");
    });

    detailCloseButton.addEventListener("click", closeDetailModal);

    detailModal.addEventListener("click", (event) => {
      if (event.target === detailModal) {
        closeDetailModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !detailModal.hidden) {
        closeDetailModal();
      }
    });

    renderStatusBoardRows(window.ERROR_BOARD_ROWS || []);
    showView("status-board");
  </script>
</body>
</html>
