<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ITSM MVP</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --surface-subtle: #f8fafc;
      --border: #d8dee6;
      --border-strong: #b9c2cf;
      --text: #17202a;
      --muted: #657386;
      --primary: #1f6feb;
      --primary-strong: #1557ba;
      --danger: #d73a49;
      --warning: #b7791f;
      --success: #218739;
      --shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      --sidebar-width: 248px;
      --header-height: 64px;
      --radius: 8px;
      font-family: Inter, "SF Pro Display", "SF Pro Text", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-width: 320px;
      color-scheme: light;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.5;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
      background: var(--bg);
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      border-right: 1px solid var(--border);
      background: #101827;
      color: #e8edf5;
    }

    .brand {
      height: var(--header-height);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      font-weight: 700;
      white-space: nowrap;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: inline-grid;
      place-items: center;
      border-radius: var(--radius);
      background: #2f81f7;
      color: #ffffff;
      font-size: 14px;
      letter-spacing: 0;
      flex: 0 0 auto;
    }

    .nav {
      display: grid;
      gap: 6px;
      padding: 16px 12px;
    }

    .nav-button {
      min-height: 44px;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: #b8c4d6;
      text-align: left;
      transition: background 180ms ease, color 180ms ease, border-color 180ms ease;
    }

    .nav-button:hover {
      background: rgba(255, 255, 255, 0.07);
      color: #ffffff;
    }

    .nav-button.is-active {
      background: rgba(47, 129, 247, 0.18);
      border-color: rgba(47, 129, 247, 0.44);
      color: #ffffff;
    }

    .nav-icon {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
    }

    .shell {
      min-width: 0;
      display: grid;
      grid-template-rows: var(--header-height) minmax(0, 1fr);
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 16px;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
    }

    .mobile-menu {
      display: none;
      width: 44px;
      height: 44px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
    }

    .page-title {
      min-width: 0;
    }

    .page-title h1 {
      margin: 0;
      color: var(--text);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1.25;
    }

    .content {
      min-width: 0;
      padding: 24px;
    }

    .view {
      display: none;
    }

    .view.is-active {
      display: block;
    }

    .workspace {
      min-height: calc(100vh - var(--header-height) - 48px);
      border: 1px dashed var(--border-strong);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .table-panel {
      min-height: calc(100vh - var(--header-height) - 48px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .table-scroll {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
    }

    .data-table {
      width: 100%;
      min-width: 1820px;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
      font-size: 13px;
      line-height: 1.35;
    }

    .data-table th,
    .data-table td {
      height: 42px;
      padding: 0 12px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      overflow: hidden;
      text-align: left;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: middle;
    }

    .data-table th {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface-subtle);
      color: #38475a;
      font-weight: 700;
    }

    .data-table th:last-child,
    .data-table td:last-child {
      border-right: 0;
    }

    .data-table .col-no {
      width: 64px;
      text-align: center;
    }

    .data-table .col-time {
      width: 150px;
    }

    .data-table .col-channel,
    .data-table .col-part {
      width: 110px;
    }

    .data-table .col-actor,
    .data-table .col-owner {
      width: 120px;
    }

    .data-table .col-code,
    .data-table .col-error-type,
    .data-table .col-error-code,
    .data-table .col-store,
    .data-table .col-host,
    .data-table .col-pid {
      width: 120px;
    }

    .data-table .col-name {
      width: 180px;
    }

    .data-table .col-message {
      width: 270px;
    }

    .data-table tbody td {
      color: #253246;
    }

    .data-table tbody tr:nth-child(even) td {
      background: #fbfcfe;
    }

    .data-table tbody tr:hover td {
      background: #f7fbff;
    }

    .data-table td.col-code,
    .data-table td.col-error-type,
    .data-table td.col-error-code,
    .data-table td.col-host,
    .data-table td.col-pid {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 12px;
    }

    .error-code {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      height: 24px;
      padding: 0 8px;
      overflow: hidden;
      border: 1px solid #f3b8bf;
      border-radius: 999px;
      background: #fff1f3;
      color: #b4232f;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: middle;
    }

    .error-type {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 24px;
      border: 1px solid #c8d3e0;
      border-radius: 999px;
      background: #f3f6fa;
      color: #314154;
      font-weight: 700;
      vertical-align: middle;
    }

    .scrim {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(15, 23, 42, 0.42);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    :focus-visible {
      outline: 3px solid rgba(31, 111, 235, 0.45);
      outline-offset: 2px;
    }

    @media (max-width: 760px) {
      :root {
        --header-height: 60px;
      }

      .app {
        grid-template-columns: minmax(0, 1fr);
      }

      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        z-index: 30;
        width: min(var(--sidebar-width), 82vw);
        transform: translateX(-100%);
        transition: transform 180ms ease;
      }

      body.nav-open .sidebar {
        transform: translateX(0);
      }

      body.nav-open .scrim {
        display: block;
      }

      .mobile-menu {
        display: inline-flex;
        flex: 0 0 auto;
      }

      .topbar {
        padding: 0 12px;
      }

      .page-title h1 {
        font-size: 17px;
      }

      .content {
        padding: 16px;
      }

      .workspace,
      .table-panel {
        min-height: calc(100vh - var(--header-height) - 32px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="주요 메뉴">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">IT</span>
        <span>ITSM MVP</span>
      </div>
      <nav class="nav">
        <button class="nav-button is-active" type="button" data-view-target="status-board">
          <svg class="nav-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none">
            <path d="M4 13h6V5H4v8Zm0 6h6v-4H4v4Zm10 0h6v-8h-6v8Zm0-10h6V5h-6v4Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          </svg>
          <span>오류상황판</span>
        </button>
        <button class="nav-button" type="button" data-view-target="event-management">
          <svg class="nav-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none">
            <path d="M6 6h12M6 12h12M6 18h7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="m16 16 2 2 4-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>이벤트 관리</span>
        </button>
      </nav>
    </aside>

    <div class="shell">
      <header class="topbar">
        <button class="mobile-menu" type="button" aria-label="메뉴 열기">
          <svg width="22" height="22" aria-hidden="true" viewBox="0 0 24 24" fill="none">
            <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="page-title" aria-live="polite">
          <h1 id="page-heading">오류상황판</h1>
        </div>
      </header>

      <main class="content">
        <section class="view is-active" id="status-board" aria-labelledby="page-heading">
          <div class="table-panel">
            <div class="table-scroll">
              <table class="data-table" aria-label="오류상황판 목록">
                <thead>
                  <tr>
                    <th class="col-no" scope="col">NO</th>
                    <th class="col-time" scope="col">등록시간</th>
                    <th class="col-channel" scope="col">채널유형</th>
                    <th class="col-part" scope="col">파트</th>
                    <th class="col-actor" scope="col">최종이행자</th>
                    <th class="col-owner" scope="col">담당자</th>
                    <th class="col-code" scope="col">거래코드</th>
                    <th class="col-name" scope="col">거래명</th>
                    <th class="col-error-type" scope="col">오류구분</th>
                    <th class="col-error-code" scope="col">에러코드</th>
                    <th class="col-message" scope="col">에러메시지</th>
                    <th class="col-store" scope="col">거래점</th>
                    <th class="col-host" scope="col">호스트명</th>
                    <th class="col-pid" scope="col">PID</th>
                  </tr>
                </thead>
                <tbody id="status-board-body"></tbody>
              </table>
            </div>
          </div>
        </section>

        <section class="view" id="event-management" aria-labelledby="page-heading">
          <div class="workspace" aria-label="이벤트 관리 빈 레이아웃"></div>
        </section>
      </main>
    </div>
  </div>

  <div class="scrim" aria-hidden="true"></div>

  <script src="sample-data.js"></script>
  <script>
    const statusBoardColumns = [
      { key: "no", className: "col-no" },
      { key: "registeredAt", className: "col-time" },
      { key: "channelType", className: "col-channel" },
      { key: "part", className: "col-part" },
      { key: "lastActor", className: "col-actor" },
      { key: "owner", className: "col-owner" },
      { key: "transactionCode", className: "col-code" },
      { key: "transactionName", className: "col-name" },
      { key: "errorType", className: "col-error-type", typeBadge: true },
      { key: "errorCode", className: "col-error-code", badge: true },
      { key: "errorMessage", className: "col-message" },
      { key: "store", className: "col-store" },
      { key: "hostName", className: "col-host" },
      { key: "pid", className: "col-pid" }
    ];

    const pageMeta = {
      "status-board": {
        title: "오류상황판"
      },
      "event-management": {
        title: "이벤트 관리"
      }
    };

    const body = document.body;
    const navButtons = [...document.querySelectorAll("[data-view-target]")];
    const views = [...document.querySelectorAll(".view")];
    const pageHeading = document.querySelector("#page-heading");
    const menuButton = document.querySelector(".mobile-menu");
    const scrim = document.querySelector(".scrim");
    const statusBoardBody = document.querySelector("#status-board-body");

    function createStatusCell(row, column) {
      const cell = document.createElement("td");
      const value = row[column.key] ?? "";

      cell.className = column.className;
      cell.title = String(value);

      if (column.badge) {
        const badge = document.createElement("span");
        badge.className = "error-code";
        badge.textContent = value;
        cell.append(badge);
        return cell;
      }

      if (column.typeBadge) {
        const badge = document.createElement("span");
        badge.className = "error-type";
        badge.textContent = value;
        cell.append(badge);
        return cell;
      }

      cell.textContent = value;
      return cell;
    }

    function renderStatusBoardRows(rows) {
      const fragment = document.createDocumentFragment();

      rows.forEach((row) => {
        const tableRow = document.createElement("tr");

        statusBoardColumns.forEach((column) => {
          tableRow.append(createStatusCell(row, column));
        });

        fragment.append(tableRow);
      });

      statusBoardBody.replaceChildren(fragment);
    }

    function showView(viewId) {
      const meta = pageMeta[viewId];

      views.forEach((view) => {
        view.classList.toggle("is-active", view.id === viewId);
      });

      navButtons.forEach((button) => {
        const isActive = button.dataset.viewTarget === viewId;
        button.classList.toggle("is-active", isActive);
        button.setAttribute("aria-current", isActive ? "page" : "false");
      });

      pageHeading.textContent = meta.title;
      body.classList.remove("nav-open");
    }

    navButtons.forEach((button) => {
      button.addEventListener("click", () => showView(button.dataset.viewTarget));
    });

    menuButton.addEventListener("click", () => {
      body.classList.toggle("nav-open");
    });

    scrim.addEventListener("click", () => {
      body.classList.remove("nav-open");
    });

    renderStatusBoardRows(window.ERROR_BOARD_ROWS || []);
    showView("status-board");
  </script>
</body>
</html>
